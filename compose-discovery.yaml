services:
  ktranslate_flow:
    image: kentik/ktranslate:latest
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_SERVICE_NAME}
    depends_on:
      - alloy
    command:
      - --format=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --nf.source=${NF_SOURCE}
      - --metalisten=0.0.0.0:9996
      - --dns=127.0.0.1:53
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=flow
      - --max_flows_per_message=100
      - --rollups=s_sum,bytes_by_flow,in_bytes+out_bytes,src_addr,dst_addr,l4_src_port,l4_dst_port,protocol,custom_str.application,device_name,custom_str.src_host,custom_str.dst_host,src_geo,dst_geo
      - --rollup_keep_undefined=true
    ports:
      - 9995:9995/udp
      - 9996:9996

  # ---- Long-running pollers. These never mutate their config files. ----
  ktranslate_snmp_cisco:
    image: kentik/ktranslate:latest
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_SERVICE_NAME}
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/config/poller-cisco.yaml
        target: /snmp.yaml
        read_only: true
      - type: bind
        source: /opt/Grafana/KtransToGrafana/state/devices-cisco.yaml
        target: /state/devices-cisco.yaml
        read_only: true
    depends_on:
      - alloy
    command:
      - --format=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --snmp=/snmp.yaml
      - --metalisten=0.0.0.0:9997
      - --dns=127.0.0.1:53
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=snmp-cisco
      - --max_flows_per_message=100
    ports:
      - 9997:9997
      - 1620:1620/udp

  ktranslate_snmp_palo:
    image: kentik/ktranslate:latest
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_SERVICE_NAME}
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/config/poller-palo.yaml
        target: /snmp.yaml
        read_only: true
      - type: bind
        source: /opt/Grafana/KtransToGrafana/state/devices-palo.yaml
        target: /state/devices-palo.yaml
        read_only: true
    depends_on:
      - alloy
    command:
      - --format=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --snmp=/snmp.yaml
      - --metalisten=0.0.0.0:9987
      - --dns=127.0.0.1:53
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=snmp-palo
      - --max_flows_per_message=100
    ports:
      - 9987:9987
      - 1621:1621/udp

  # ---- Short-lived discovery containers. Gated by the "discovery" profile so
  # ---- `docker compose up` never starts them. Invoke via scripts/run-discovery.sh.
  discover_cisco:
    image: kentik/ktranslate:latest
    pull_policy: always
    profiles: ["discovery"]
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/state/discovery-cisco.runtime.yaml
        target: /snmp.yaml
    command:
      - --snmp=/snmp.yaml
      - -snmp_discovery=true
      - --tee_logs=true
      - --service_name=discover-cisco

  discover_palo:
    image: kentik/ktranslate:latest
    pull_policy: always
    profiles: ["discovery"]
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/state/discovery-palo.runtime.yaml
        target: /snmp.yaml
    command:
      - --snmp=/snmp.yaml
      - -snmp_discovery=true
      - --tee_logs=true
      - --service_name=discover-palo

  ktranslate_syslog:
    image: kentik/ktranslate:latest
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_SERVICE_NAME}
    depends_on:
      - alloy
    command:
      - --format=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --syslog.source=${SYSLOG_SOURCE}
      - --metalisten=0.0.0.0:9998
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=syslog
    ports:
      - 1514:1514/udp
      - 1514:1514/tcp
      - 9998:9998

  alloy:
    image: grafana/alloy:latest
    restart: always
    pull_policy: always
    environment:
      - GC_OTLP_URL=${GC_OTLP_URL}
      - GC_OTLP_ACCOUNT=${GC_OTLP_ACCOUNT}
      - GC_OTLP_KEY=${GC_OTLP_KEY}
      - OTEL_METRIC_EXPORT_INTERVAL=1000
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/config.alloy
        target: /config.alloy
    ports:
      - 4317:4317
      - 12346:12346
    command:
      - --server.http.listen-addr=0.0.0.0:12346
      - --storage.path=/var/lib/alloy/data
      - --stability.level=experimental
      - run
      - /config.alloy