services:
  ktranslate_flow:
    image: quay.io/kentik/ktranslate:v2
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=${OTEL_SERVICE_NAME}
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_EXPORTER_OTLP_COMPRESSION}
    depends_on:
      - alloy
    command:
      - --format=otel
      - --format_metric=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --nf.source=${NF_SOURCE}
      - --metalisten=0.0.0.0:9996
      - --dns=127.0.0.1:53
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=flow
      - --max_flows_per_message=100
      - --rollup_interval=60
      - --rollup_top_k=100
      - --rollups=s_sum,bytes_by_flow,in_bytes+out_bytes,src_addr,dst_addr,l4_src_port,l4_dst_port,protocol,custom_str.application,device_name,custom_str.src_host,custom_str.dst_host,src_geo,dst_geo
      - --rollup_keep_undefined=true
    ports:
      - 9995:9995/udp
      - 9996:9996

  ktranslate_syslog:
    image: quay.io/kentik/ktranslate:v2
    restart: always
    pull_policy: always
    environment:
      - OTEL_SERVICE_NAME=ktranslate-syslog
      - OTEL_EXPORTER_OTLP_COMPRESSION=${OTEL_EXPORTER_OTLP_COMPRESSION}
    depends_on:
      - alloy
    command:
      - --format=otel
      - --format_metric=otel
      - --otel.protocol=grpc
      - --otel.endpoint=http://alloy:4317/
      - --syslog.source=${SYSLOG_SOURCE}
      - --metalisten=0.0.0.0:9998
      - --sinks=otel
      - --metrics=jchf
      - --tee_logs=true
      - --service_name=syslog
    ports:
      - 1514:1514/udp
      - 1514:1514/tcp
      - 9998:9998

  alloy:
    image: grafana/alloy:latest
    restart: always
    pull_policy: always
    environment:
      - GC_OTLP_URL=${GC_OTLP_URL}
      - GC_OTLP_ACCOUNT=${GC_OTLP_ACCOUNT}
      - GC_OTLP_KEY=${GC_OTLP_KEY}
      - OTEL_METRIC_EXPORT_INTERVAL=1000
    volumes:
      - type: bind
        source: /opt/Grafana/KtransToGrafana/config.alloy
        target: /config.alloy
    ports:
      - 4317:4317
      - 12346:12346
    command:
      - --server.http.listen-addr=0.0.0.0:12346
      - --storage.path=/var/lib/alloy/data
      - --stability.level=experimental
      - run
      - /config.alloy
